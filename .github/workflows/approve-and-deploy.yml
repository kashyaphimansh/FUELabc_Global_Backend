name: Approve and Deploy FUELabc AU

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: fuelabc-au-production
  cancel-in-progress: false

jobs:
  inspect-approval:
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.inspect.outputs.eligible }}
      reason: ${{ steps.inspect.outputs.reason }}
      commit_sha: ${{ steps.inspect.outputs.commit_sha }}
      ci_run_id: ${{ steps.inspect.outputs.ci_run_id }}
      issue_number: ${{ steps.inspect.outputs.issue_number }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Inspect approval comment
        id: inspect
        uses: actions/github-script@v7
        env:
          FUELABC_AU_PRODUCTION_APPROVERS: ${{ vars.FUELABC_AU_PRODUCTION_APPROVERS }}
        with:
          script: |
            const { execFileSync } = require('child_process');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const actor = context.actor;
            const trimmedComment = (context.payload.comment.body || '').trim();
            const marker = '<!-- fuelabc-au-production-deployment -->';
            const processedLabels = ['deployment-in-progress', 'deployed', 'deployment-failed'];

            function setResult({
              eligible = 'false',
              reason,
              commitSha = '',
              ciRunId = '',
            }) {
              core.setOutput('eligible', eligible);
              core.setOutput('reason', reason);
              core.setOutput('commit_sha', commitSha);
              core.setOutput('ci_run_id', ciRunId);
              core.setOutput('issue_number', String(issueNumber));
            }

            setResult({ reason: 'initial' });

            async function addComment(body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

            async function failIntegrity(reason, body, commitSha = '', ciRunId = '') {
              setResult({ reason, commitSha, ciRunId });
              await addComment(body);
              core.setFailed(body);
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (context.payload.issue.pull_request) {
              core.info('Ignoring approval command on pull request conversation.');
              setResult({ reason: 'pull_request_comment' });
              return;
            }

            if (trimmedComment !== '/approve-production') {
              core.info('Ignoring comment because it is not the exact approval command.');
              setResult({ reason: 'unrelated_comment' });
              return;
            }

            const issueResponse = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });
            const issue = issueResponse.data;
            const issueBody = issue.body || '';

            if (!issueBody.includes(marker)) {
              core.info('Ignoring approval command on an issue without deployment metadata.');
              setResult({ reason: 'not_a_deployment_issue' });
              return;
            }

            const labels = issue.labels.map((label) => {
              return typeof label === 'string' ? label : label.name;
            });
            const hasAwaitingApproval = labels.includes('awaiting-approval');
            const hasProcessedLabel = labels.some((label) => processedLabels.includes(label));

            if (!hasAwaitingApproval && hasProcessedLabel) {
              core.info('Ignoring approval command because deployment issue is already processed.');
              setResult({ reason: 'already_processed' });
              return;
            }

            if (issue.state !== 'open') {
              await failIntegrity(
                'issue_not_open',
                'Production approval failed: approval issue is not open.'
              );
              return;
            }

            if (!hasAwaitingApproval) {
              await failIntegrity(
                'missing_awaiting_approval_label',
                'Production approval failed: issue is not awaiting approval.'
              );
              return;
            }

            const shaMatches = [...issueBody.matchAll(/^FUELABC_AU_COMMIT_SHA=([0-9a-fA-F]{40})$/gm)];
            const runMatches = [...issueBody.matchAll(/^FUELABC_AU_CI_RUN_ID=([0-9]+)$/gm)];

            if (shaMatches.length !== 1) {
              await failIntegrity(
                'invalid_commit_sha_metadata',
                'Production approval failed: approval commit SHA metadata is invalid.'
              );
              return;
            }

            if (runMatches.length !== 1) {
              await failIntegrity(
                'invalid_ci_run_id_metadata',
                'Production approval failed: approval CI run metadata is invalid.'
              );
              return;
            }

            const commitSha = shaMatches[0][1].toLowerCase();
            const ciRunId = runMatches[0][1];
            setResult({ reason: 'metadata_validated', commitSha, ciRunId });

            const approvers = (process.env.FUELABC_AU_PRODUCTION_APPROVERS || '')
              .split(',')
              .map((entry) => entry.trim().toLowerCase())
              .filter(Boolean);

            if (!approvers.includes(actor.toLowerCase())) {
              await addComment(`❌ Production approval denied for @${actor}.`);
              setResult({ reason: 'unauthorized', commitSha, ciRunId });
              return;
            }

            try {
              await github.rest.repos.getCommit({
                owner,
                repo,
                ref: commitSha,
              });
            } catch (error) {
              await failIntegrity(
                'commit_not_found',
                'Production approval failed: approved commit does not exist in this repository.',
                commitSha,
                ciRunId
              );
              return;
            }

            try {
              execFileSync('git', ['merge-base', '--is-ancestor', commitSha, 'HEAD'], {
                stdio: 'ignore',
              });
            } catch (error) {
              await failIntegrity(
                'commit_not_reachable_from_main',
                'Production approval failed: commit is not reachable from main.',
                commitSha,
                ciRunId
              );
              return;
            }

            let run;
            try {
              const runResponse = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: Number(ciRunId),
              });
              run = runResponse.data;
            } catch (error) {
              await failIntegrity(
                'ci_run_not_found',
                'Production approval failed: CI workflow run was not found.',
                commitSha,
                ciRunId
              );
              return;
            }

            const runChecks = [
              run.conclusion === 'success',
              run.event === 'push',
              run.head_branch === 'main',
              (run.head_sha || '').toLowerCase() === commitSha,
              run.name === 'FUELabc AU CI',
            ];

            if (!runChecks.every(Boolean)) {
              await failIntegrity(
                'ci_run_metadata_mismatch',
                'Production approval failed: CI workflow metadata did not match the approved commit.',
                commitSha,
                ciRunId
              );
              return;
            }

            await ensureLabel(
              'deployment-in-progress',
              '1d76db',
              'Production deployment is in progress'
            );
            await ensureLabel(
              'deployed',
              '0e8a16',
              'Production deployment completed'
            );
            await ensureLabel(
              'deployment-failed',
              'b60205',
              'Production deployment failed'
            );

            await removeLabel('awaiting-approval');

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['deployment-in-progress'],
            });

            setResult({
              eligible: 'true',
              reason: 'eligible',
              commitSha,
              ciRunId,
            });

  deploy:
    needs: inspect-approval
    if: ${{ needs['inspect-approval'].outputs.eligible == 'true' }}
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ needs['inspect-approval'].outputs.commit_sha }}
      ISSUE_NUMBER: ${{ needs['inspect-approval'].outputs.issue_number }}
      ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.FUELABC_AU_DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.FUELABC_AU_SSH_HOST_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SSH_KEY:?FUELABC_AU_DEPLOY_SSH_KEY is required}"
          : "${DEPLOY_HOST_KEY:?FUELABC_AU_SSH_HOST_KEY is required}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/fuelabc_au_deploy_key"
          printf '%s\n' "$DEPLOY_HOST_KEY" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/fuelabc_au_deploy_key"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy approved commit
        id: deploy
        env:
          DEPLOY_HOST: ${{ vars.FUELABC_AU_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.FUELABC_AU_DEPLOY_USER }}
          DEPLOY_PORT: ${{ vars.FUELABC_AU_DEPLOY_PORT }}
        run: |
          set -euo pipefail
          : "${COMMIT_SHA:?COMMIT_SHA is required}"
          : "${DEPLOY_HOST:?FUELABC_AU_DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?FUELABC_AU_DEPLOY_USER is required}"
          : "${DEPLOY_PORT:?FUELABC_AU_DEPLOY_PORT is required}"
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "COMMIT_SHA must be a 40-character hexadecimal SHA." >&2
            exit 1
          fi
          set +e
          ssh \
            -i "$HOME/.ssh/fuelabc_au_deploy_key" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "deploy $COMMIT_SHA" 2>&1 | tee deploy-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Update approval issue
        if: always()
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ env.COMMIT_SHA }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          PUBLIC_URL: ${{ vars.FUELABC_AU_PUBLIC_URL }}
          ACTIONS_RUN_URL: ${{ env.ACTIONS_RUN_URL }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(process.env.ISSUE_NUMBER);
            const commitSha = process.env.COMMIT_SHA;
            const publicUrl = process.env.PUBLIC_URL || 'not configured';
            const actionsRunUrl = process.env.ACTIONS_RUN_URL;
            const deployOutcome = process.env.DEPLOY_OUTCOME || 'failure';
            const output = fs.existsSync('deploy-output.txt')
              ? fs.readFileSync('deploy-output.txt', 'utf8')
              : '';

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await ensureLabel('deployed', '0e8a16', 'Production deployment completed');
            await ensureLabel('deployment-failed', 'b60205', 'Production deployment failed');
            await removeLabel('deployment-in-progress');

            if (deployOutcome === 'success') {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['deployed'],
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `FUELabc AU production deployment completed successfully.\n\nCommit SHA: ${commitSha}\nProduction URL: ${publicUrl}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed',
              });
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['deployment-failed'],
            });

            const rollbackCompleted = output.includes('DEPLOYMENT_STATUS=FAILED_ROLLED_BACK');
            const rollbackFailed = output.includes('DEPLOYMENT_STATUS=ROLLBACK_FAILED');
            const rollbackLine = rollbackCompleted
              ? '\n\nAutomatic code rollback completed.'
              : rollbackFailed
                ? '\n\nCRITICAL: AUTOMATIC ROLLBACK FAILED.'
                : '';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `FUELabc AU production deployment failed.\n\nCommit SHA: ${commitSha}\nGitHub Actions run: ${actionsRunUrl}\n\nThe server deployment script performs automatic code rollback after post-activation health failure.\nDatabase migrations are not automatically reversed.\nStatic files are not automatically rolled back.${rollbackLine}`,
            });
